---
name: 'Kusari Ingest'
description: 'Ingest files into Kusari Platform'
branding:
  icon: "shield"
  color: "purple"
author: 'Kusari'
inputs:
  file-path:
    description: 'Path to directory or specific file to ingest. Required unless generate is true.'
    required: false
    default: ""
  generate:
    description: 'Generate an SBOM with `kusari platform generate` (via mikebom) and upload it, instead of uploading an existing file.'
    required: false
    default: "false"
  source-path:
    description: 'Source path to scan when generate is true. Passed to mikebom as `--path`. Exactly one of `source-path` or `image` is required when generate is true.'
    required: false
    default: ""
  image:
    description: 'Container image reference (OCI ref or `docker save` tarball path) to scan when generate is true. Passed to mikebom as `--image`. Exactly one of `source-path` or `image` is required when generate is true.'
    required: false
    default: ""
  output-path:
    description: 'Path where the generated SBOM is written (used when generate is true). Passed to mikebom as `--output` and then used as the file to upload. Default matches mikebom''s CycloneDX default.'
    required: false
    default: "project.cdx.json"
  mikebom-args:
    description: 'Additional flags passed verbatim to `mikebom sbom scan` after `--` when generate is true. Avoid overriding `--output` here; use the `output-path` input instead.'
    required: false
    default: ""
  root-name:
    description: 'mikebom `--root-name` value used when generate is true. When unset, mikebom uses its own auto-derivation.'
    required: false
    default: ""
  root-version:
    description: 'mikebom `--root-version` value used when generate is true. When unset, mikebom uses its own auto-derivation.'
    required: false
    default: ""
  tenant-endpoint:
    description: 'Kusari Platform tenant api endpoint'
    required: true
  client-id:
    description: 'Client id for auth token provider'
    required: true
  client-secret:
    description: 'Client secret for auth token provider'
    required: true
  token-endpoint:
    description: 'Kusari Platform auth token provider endpoint'
    required: true
    default: https://auth.us.kusari.cloud/oauth2/token
  alias:
    description: 'Alias of the package for grouping'
    required: false
    default: ""
  document-type:
    description: 'Type of the file being uploaded'
    required: false
    default: ""
  open-vex:
    description: 'Set to true if ingesting an OpenVEX document. When true, tag is required and so is one of software-id and sbom-subject.'
    required: false
    default: "false"
  tag:
    description: 'Tag for the document. Currently only used for OpenVEX. Example: govulncheck'
    required: false
  software-id:
    description: 'Kusari Platform software ID that the document applies to. Currently only used for OpenVEX. Example: 1234'
    required: false
  sbom-subject:
    description: 'Kusari Platform software SBOM subject substring value that uniquely indicates which software that the document applies to. Currently only used for OpenVex. Example: kusari-ingest'
    required: false
  check-blocked-packages:
    description: Check SBOM dependencies against the Blocked Package list in the Kusari Platform.
    required: false
    default: "false"
  sbom-subject-name-override:
    description: 'SBOM Subject Name override (optional, for SBOMs only)'
    required: false
    default: ""
  sbom-subject-version-override:
    description: 'SBOM Subject Version override (optional, for SBOMs only)'
    required: false
    default: ""
  commit-sha:
    description: 'Commit SHA to associate with the uploaded document (optional)'
    required: false
    default: ${{ github.sha }}
  wait:
    description: 'Wait for ingestion status (default: true)'
    required: false
    default: "true"
outputs:
  console_out:
    description: 'Kusari Platform ingestion output'
runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - "--file-path=${{ inputs.file-path }}"
    - "--client-id=${{ inputs.client-id }}"
    - "--client-secret=${{ inputs.client-secret }}"
    - "--tenant-endpoint=${{ inputs.tenant-endpoint }}"
    - "--token-endpoint=${{ inputs.token-endpoint }}"
    - "--alias=${{ inputs.alias }}"
    - "--document-type=${{ inputs.document-type }}"
    - "--open-vex=${{ inputs.open-vex }}"
    - "--tag=${{ inputs.tag }}"
    - "--software-id=${{ inputs.software-id }}"
    - "--sbom-subject=${{ inputs.sbom-subject }}"
    - "--check-blocked-packages=${{ inputs.check-blocked-packages }}"
    - "--sbom-subject-name-override=${{ inputs.sbom-subject-name-override }}"
    - "--sbom-subject-version-override=${{ inputs.sbom-subject-version-override }}"
    - "--commit-sha=${{ inputs.commit-sha }}"
    - "--wait=${{ inputs.wait }}"
    - "--generate=${{ inputs.generate }}"
    - "--source-path=${{ inputs.source-path }}"
    - "--image=${{ inputs.image }}"
    - "--output-path=${{ inputs.output-path }}"
    - "--mikebom-args=${{ inputs.mikebom-args }}"
    - "--root-name=${{ inputs.root-name }}"
    - "--root-version=${{ inputs.root-version }}"
